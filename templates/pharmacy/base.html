{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Pharmacy System{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #6fb9ff, #42a5f5);
            padding: 25px 15px;
            color: white;
            transition: 0.3s;
        }

        .sidebar h4 {
            font-weight: 600;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            background-color: rgba(255,255,255,0.25);
            transform: translateX(5px);
        }

        .sidebar a.active {
            background-color: white;
            color: #0d6efd;
            font-weight: 500;
        }

        /* Collapse */
        .sidebar.collapsed {
            width: 70px !important;
        }

        .sidebar.collapsed a {
            text-align: center;
            font-size: 0;
        }

        .sidebar.collapsed a i {
            font-size: 18px;
        }

        .sidebar.collapsed h4 {
            display: none;
        }

        /* Topbar */
        .topbar {
            background: white;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar" id="sidebar">

            <h4>
                <i class="fa-solid fa-prescription-bottle-medical"></i> MedCare
            </h4>

            <a href="{% url 'home' %}"
               class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <i class="fa-solid fa-house me-2"></i> Home
            </a>

            <a href="{% url 'dashboard' %}"
               class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fa-solid fa-chart-line me-2"></i> Dashboard
            </a>

            <a href="{% url 'medicine_list' %}"
               class="{% if request.resolver_match.url_name == 'medicine_list' %}active{% endif %}">
                <i class="fa-solid fa-capsules me-2"></i> Medicines
            </a>

            <a href="{% url 'add_medicine' %}"
               class="{% if request.resolver_match.url_name == 'add_medicine' %}active{% endif %}">
                <i class="fa-solid fa-plus me-2"></i> Add Medicine
            </a>

            <a href="{% url 'add_batch' %}"
               class="{% if request.resolver_match.url_name == 'add_batch' %}active{% endif %}">
                <i class="fa-solid fa-box me-2"></i> Add Batch
            </a>

            <a href="{% url 'transaction_list' %}"
               class="{% if request.resolver_match.url_name == 'transaction_list' %}active{% endif %}">
                <i class="fa-solid fa-money-bill-wave me-2"></i> Transactions
            </a>

        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <div class="topbar d-flex justify-content-between align-items-center p-3 shadow-sm">

                <div class="d-flex align-items-center">
                    <button class="btn btn-light me-3" onclick="toggleSidebar()">
                        <i class="fa-solid fa-bars"></i>
                    </button>

                    <h5 class="mb-0 fw-semibold">
                        {% block page_title %}Pharmacy Management System{% endblock %}
                    </h5>
                </div>

                <div class="d-flex align-items-center">
                    <span class="me-2 fw-semibold">Safa</span>
                    <img src="{% static 'images/user.png' %}"
                         class="rounded-circle"
                         width="40"
                         height="40">
                </div>
            </div>

            <div class="p-4 fade-in">
                {% block content %}
                {% endblock %}
            </div>

        </div>

    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}
</script>

</body>
</html>
