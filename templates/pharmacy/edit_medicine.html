{% extends 'pharmacy/base.html' %}

{% block title %}Edit Medicine | Pharmacy System{% endblock %}
{% block page_title %}Edit Medicine{% endblock %}

{% block content %}

<div class="card p-4 shadow-sm">
    <h4 class="mb-4">Update Medicine</h4>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Medicine Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ medicine.name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" name="price"
                   class="form-control"
                   value="{{ medicine.price }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock"
                   class="form-control"
                   value="{{ medicine.stock }}" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Update Medicine
        </button>

        <a href="{% url 'medicine_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>
</div>

{% endblock %}
